# ClawMonitor configuration (TOML)

[openclaw]
root = "~/.openclaw"
openclaw_bin = "openclaw"

[refresh]
ui_seconds = 5.0 # TUI/model refresh interval; press 'f' in TUI to cycle (up to 10 minutes)
gateway_log_poll_seconds = 2.0
channels_status_poll_seconds = 5.0
delivery_queue_poll_seconds = 30.0

[limits]
transcript_tail_bytes = 65536
gateway_log_ring_lines = 5000
report_max_log_lines = 200

[ui]
hide_system_sessions = false

# Optional human-friendly labels for sessions/targets.
#
# Supported key shapes:
# - sessionKey:<full session key> = "My Label"
# - target:<channel>:<to>        = "My Label"   (uses sessions.json deliveryContext.to / lastTo)
# - id:<channel>:<id>            = "My Label"   (uses sessionKey tail, e.g. Feishu ou_/oc_ ids)
#
# Examples:
# [labels]
# "id:feishu:ou_4a2c2c233c31cda49573d6848482920e" = "Math Q&A"
# "id:telegram:8561029144" = "My Telegram DM"
